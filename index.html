<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LOOPIFY — YouTube Audio Loop Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #131313; --surface2: #1c1c1c;
      --accent: #c8f55a; --accent2: #5af5c8; --text: #f0f0f0;
      --muted: #555; --border: #222;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.5;
    }
    .wrapper {
      position: relative; z-index: 1; width: 100%;
      max-width: 560px; display: flex; flex-direction: column; gap: 24px;
    }
    .header { display: flex; align-items: baseline; gap: 12px; }
    .logo { font-size: 2.4rem; font-weight: 800; letter-spacing: -2px; color: var(--accent); line-height: 1; }
    .tagline { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
    .input-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .input-label { font-family: 'Space Mono', monospace; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }
    .input-row { display: flex; gap: 10px; }
    input[type="text"] {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px; color: var(--text);
      font-family: 'Space Mono', monospace; font-size: 0.78rem;
      outline: none; transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }
    .load-btn {
      background: var(--accent); color: #0a0a0a; border: none;
      border-radius: 10px; padding: 12px 20px;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
      cursor: pointer; transition: transform 0.15s, background 0.2s; white-space: nowrap;
    }
    .load-btn:hover { background: #d4ff6a; transform: scale(1.03); }
    .load-btn:active { transform: scale(0.97); }
    .player-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      display: none; flex-direction: column;
      animation: fadeUp 0.4s ease forwards;
    }
    .player-card.visible { display: flex; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #yt-player { position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px; }
    .track-info { padding: 20px 20px 0; display: flex; flex-direction: column; gap: 4px; }
    .track-type { font-family: 'Space Mono', monospace; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent2); }
    .track-title { font-size: 1.05rem; font-weight: 700; line-height: 1.3; color: var(--text); }
    .visualizer {
      display: flex; align-items: center; gap: 3px;
      padding: 20px 20px 4px; height: 52px;
    }
    .bar {
      flex: 1; background: var(--accent); border-radius: 2px;
      opacity: 0.3; transform-origin: bottom; animation: none;
    }
    .visualizer.playing .bar { opacity: 1; animation: wave var(--dur, 1s) ease-in-out infinite alternate; }
    @keyframes wave { from { transform: scaleY(0.15); } to { transform: scaleY(1); } }
    .bar:nth-child(1)  { --dur:0.7s;  animation-delay:0.00s }
    .bar:nth-child(2)  { --dur:0.5s;  animation-delay:0.10s }
    .bar:nth-child(3)  { --dur:0.9s;  animation-delay:0.05s }
    .bar:nth-child(4)  { --dur:0.6s;  animation-delay:0.20s }
    .bar:nth-child(5)  { --dur:0.8s;  animation-delay:0.15s }
    .bar:nth-child(6)  { --dur:0.55s; animation-delay:0.30s }
    .bar:nth-child(7)  { --dur:0.75s; animation-delay:0.08s }
    .bar:nth-child(8)  { --dur:0.65s; animation-delay:0.25s }
    .bar:nth-child(9)  { --dur:0.85s; animation-delay:0.12s }
    .bar:nth-child(10) { --dur:0.6s;  animation-delay:0.18s }
    .bar:nth-child(11) { --dur:0.95s; animation-delay:0.04s }
    .bar:nth-child(12) { --dur:0.7s;  animation-delay:0.22s }
    .bar:nth-child(13) { --dur:0.5s;  animation-delay:0.33s }
    .bar:nth-child(14) { --dur:0.8s;  animation-delay:0.07s }
    .bar:nth-child(15) { --dur:0.65s; animation-delay:0.28s }
    .bar:nth-child(16) { --dur:0.9s;  animation-delay:0.16s }
    .bar:nth-child(17) { --dur:0.55s; animation-delay:0.35s }
    .bar:nth-child(18) { --dur:0.75s; animation-delay:0.02s }
    .bar:nth-child(19) { --dur:0.85s; animation-delay:0.24s }
    .bar:nth-child(20) { --dur:0.6s;  animation-delay:0.11s }
    .controls { display: flex; align-items: center; gap: 12px; padding: 12px 20px 20px; }
    .ctrl-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 50%; width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
      color: var(--text); font-size: 1.1rem;
    }
    .ctrl-btn:hover { background: #2a2a2a; transform: scale(1.07); }
    .ctrl-btn.primary {
      background: var(--accent); color: #0a0a0a;
      width: 56px; height: 56px; font-size: 1.3rem; border: none;
    }
    .ctrl-btn.primary:hover { background: #d4ff6a; }
    .loop-badge {
      margin-left: auto; font-family: 'Space Mono', monospace;
      font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px;
      padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s; color: var(--muted);
    }
    .loop-badge.on { border-color: var(--accent2); color: var(--accent2); background: rgba(90,245,200,0.07); }
    .vol-row { display: flex; align-items: center; gap: 10px; padding: 0 20px 20px; }
    .vol-icon { font-size: 0.9rem; color: var(--muted); width: 20px; text-align: center; }
    input[type="range"] {
      -webkit-appearance: none; flex: 1; height: 3px;
      background: var(--surface2); border-radius: 3px; outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
    }
    .playlist-list { border-top: 1px solid var(--border); max-height: 180px; overflow-y: auto; display: none; }
    .playlist-list.visible { display: block; }
    .playlist-list::-webkit-scrollbar { width: 4px; }
    .playlist-list::-webkit-scrollbar-track { background: transparent; }
    .playlist-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .pl-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px; cursor: pointer; transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }
    .pl-item:last-child { border-bottom: none; }
    .pl-item:hover { background: var(--surface2); }
    .pl-item.active { background: rgba(200,245,90,0.06); }
    .pl-num { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); width: 20px; }
    .pl-item.active .pl-num { color: var(--accent); }
    .pl-title { font-size: 0.78rem; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pl-item.active .pl-title { color: var(--accent); }
    .status { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); text-align: center; padding: 0 20px 16px; min-height: 1.4em; }
    .error-msg { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: #ff6b6b; text-align: center; min-height: 1em; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="logo">LOOPIFY</div>
    <div class="tagline">YouTube → Audio Loop</div>
  </div>

  <div class="input-card">
    <div class="input-label">Paste a YouTube video or playlist URL</div>
    <div class="input-row">
      <input type="text" id="url-input" placeholder="https://youtube.com/watch?v=..." />
      <button class="load-btn" onclick="loadURL()">Load</button>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="player-card" id="player-card">
    <div id="yt-player"></div>

    <div class="track-info">
      <div class="track-type" id="track-type">VIDEO</div>
      <div class="track-title" id="track-title">Loading...</div>
    </div>

    <div class="visualizer" id="visualizer">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" onclick="prevTrack()" title="Previous">&#9664;&#9664;</button>
      <button class="ctrl-btn primary" id="play-btn" onclick="togglePlay()">&#9654;</button>
      <button class="ctrl-btn" onclick="nextTrack()" title="Next">&#9654;&#9654;</button>
      <div class="loop-badge on" id="loop-badge" onclick="toggleLoop()">&#8635; Loop</div>
    </div>

    <div class="vol-row">
      <div class="vol-icon">&#128264;</div>
      <input type="range" id="vol-slider" min="0" max="100" value="80" oninput="setVolume(this.value)" />
      <div class="vol-icon">&#128266;</div>
    </div>

    <div class="status" id="status-msg"></div>
    <div class="playlist-list" id="playlist-list"></div>
  </div>
</div>

<!-- Load YT API -->
<script>
  var tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  var player, isPlaying = false, loopOn = true;
  var isPlaylist = false, currentIndex = 0;
  var videoIds = [], videoTitles = [];
  var playerReady = false;
  var pendingLoad = null;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('yt-player', {
      width: '1', height: '1',
      playerVars: {
        autoplay: 1,
        controls: 0,
        disablekb: 1,
        fs: 0,
        modestbranding: 1,
        playsinline: 1
      },
      events: {
        onReady: function(e) {
          playerReady = true;
          e.target.setVolume(80);
          if (pendingLoad) { pendingLoad(); pendingLoad = null; }
        },
        onStateChange: onStateChange,
        onError: function(e) {
          setStatus('');
          showError('Could not play this video — it may be restricted. Try another URL.');
        }
      }
    });
  }

  function onStateChange(e) {
    var S = YT.PlayerState;
    if (e.data === S.PLAYING) {
      setPlaying(true);
      var d = player.getVideoData();
      if (d && d.title) setTitle(d.title);
      // Update active playlist item
      if (isPlaylist) {
        currentIndex = player.getPlaylistIndex();
        highlightItem(currentIndex);
      }
    } else if (e.data === S.PAUSED) {
      setPlaying(false);
    } else if (e.data === S.ENDED) {
      handleEnded();
    } else if (e.data === S.BUFFERING) {
      setStatus('Buffering...');
    } else if (e.data === S.CUED) {
      player.playVideo();
    }
  }

  function handleEnded() {
    if (isPlaylist) {
      var total = videoIds.length;
      if (total === 0) return;
      if (currentIndex < total - 1) {
        currentIndex++;
        playIndex(currentIndex);
      } else if (loopOn) {
        currentIndex = 0;
        playIndex(0);
      } else {
        setPlaying(false);
        setStatus('Playlist ended');
      }
    } else {
      if (loopOn) {
        player.seekTo(0);
        player.playVideo();
      } else {
        setPlaying(false);
        setStatus('Ended');
      }
    }
  }

  function parseURL(url) {
    try {
      var u = new URL(url.trim());
      var list = u.searchParams.get('list');
      var v = u.searchParams.get('v') || (u.hostname === 'youtu.be' ? u.pathname.slice(1).split('?')[0] : null);
      return { videoId: v, listId: list };
    } catch(e) { return null; }
  }

  function loadURL() {
    var raw = document.getElementById('url-input').value.trim();
    clearError();
    if (!raw) { showError('Please paste a YouTube URL first.'); return; }
    var parsed = parseURL(raw);
    if (!parsed || (!parsed.videoId && !parsed.listId)) {
      showError("That doesn't look like a valid YouTube URL."); return;
    }

    document.getElementById('player-card').classList.add('visible');
    setStatus('Loading...');
    setTitle('Loading...');

    var go = function() {
      if (parsed.listId) {
        loadPlaylist(parsed.listId, parsed.videoId);
      } else {
        loadSingleVideo(parsed.videoId);
      }
    };

    if (playerReady) { go(); }
    else { pendingLoad = go; }
  }

  // ── Single video ──────────────────────────────────────
  function loadSingleVideo(id) {
    isPlaylist = false;
    videoIds = [id];
    currentIndex = 0;
    document.getElementById('track-type').textContent = 'VIDEO';
    document.getElementById('playlist-list').classList.remove('visible');
    player.loadVideoById(id);
    // Fetch title
    fetchTitle(id, function(title) { setTitle(title); });
  }

  // ── Playlist ──────────────────────────────────────────
  function loadPlaylist(listId, startVideoId) {
    isPlaylist = true;
    document.getElementById('track-type').textContent = 'PLAYLIST';

    // Use YT player's native playlist support
    player.loadPlaylist({
      listType: 'playlist',
      list: listId,
      index: 0,
      suggestedQuality: 'small'
    });

    // Poll until playlist is populated
    waitForPlaylist(function() {
      var ids = player.getPlaylist();
      if (!ids || ids.length === 0) {
        showError('Could not load playlist. It may be private or empty.');
        return;
      }
      videoIds = ids;
      currentIndex = 0;
      buildPlaylistUI(ids);
      setStatus('Playing playlist — ' + ids.length + ' tracks');
    });
  }

  function waitForPlaylist(cb, attempts) {
    attempts = attempts || 0;
    if (attempts > 30) { cb(); return; } // give up after ~6s
    var ids = player.getPlaylist ? player.getPlaylist() : null;
    if (ids && ids.length > 0) { cb(); }
    else { setTimeout(function() { waitForPlaylist(cb, attempts + 1); }, 200); }
  }

  function playIndex(idx) {
    if (isPlaylist) {
      player.playVideoAt(idx);
    } else {
      player.seekTo(0); player.playVideo();
    }
    highlightItem(idx);
  }

  function buildPlaylistUI(ids) {
    var list = document.getElementById('playlist-list');
    list.innerHTML = '';
    ids.forEach(function(vid, i) {
      var item = document.createElement('div');
      item.className = 'pl-item' + (i === 0 ? ' active' : '');
      item.dataset.index = i;
      item.innerHTML =
        '<div class="pl-num">' + String(i+1).padStart(2,'0') + '</div>' +
        '<div class="pl-title" id="pltitle-' + i + '">Track ' + (i+1) + '</div>';
      item.onclick = function() {
        currentIndex = i;
        player.playVideoAt(i);
        highlightItem(i);
      };
      list.appendChild(item);
    });
    list.classList.add('visible');

    // Fetch titles in batches (noembed, no API key needed)
    ids.slice(0, 30).forEach(function(vid, i) {
      setTimeout(function() {
        fetchTitle(vid, function(title) {
          var el = document.getElementById('pltitle-' + i);
          if (el) el.textContent = title;
          if (i === currentIndex) setTitle(title);
        });
      }, i * 120); // stagger to avoid rate limits
    });
  }

  function fetchTitle(videoId, cb) {
    fetch('https://noembed.com/embed?url=https://www.youtube.com/watch?v=' + videoId)
      .then(function(r) { return r.json(); })
      .then(function(d) { if (d && d.title) cb(d.title); })
      .catch(function() {});
  }

  function highlightItem(idx) {
    document.querySelectorAll('.pl-item').forEach(function(el) {
      el.classList.toggle('active', parseInt(el.dataset.index) === idx);
    });
  }

  // ── Controls ──────────────────────────────────────────
  function togglePlay() {
    if (!player || !playerReady) return;
    if (isPlaying) player.pauseVideo(); else player.playVideo();
  }

  function prevTrack() {
    if (!playerReady) return;
    if (isPlaylist) {
      currentIndex = (currentIndex - 1 + videoIds.length) % videoIds.length;
      playIndex(currentIndex);
    } else { player.seekTo(0); }
  }

  function nextTrack() {
    if (!playerReady) return;
    if (isPlaylist) {
      currentIndex = (currentIndex + 1) % videoIds.length;
      playIndex(currentIndex);
    } else { player.seekTo(0); player.playVideo(); }
  }

  function toggleLoop() {
    loopOn = !loopOn;
    var badge = document.getElementById('loop-badge');
    badge.classList.toggle('on', loopOn);
    setStatus(loopOn ? 'Loop ON' : 'Loop OFF');
  }

  function setVolume(v) {
    if (player && playerReady) player.setVolume(parseInt(v));
  }

  // ── UI helpers ────────────────────────────────────────
  function setPlaying(val) {
    isPlaying = val;
    document.getElementById('play-btn').innerHTML = val ? '&#9646;&#9646;' : '&#9654;';
    document.getElementById('visualizer').classList.toggle('playing', val);
    if (val) setStatus(isPlaylist ? 'Playing track ' + (currentIndex+1) + ' of ' + videoIds.length : '▶ Playing');
  }

  function setTitle(t) { document.getElementById('track-title').textContent = t; }
  function setStatus(m) { document.getElementById('status-msg').textContent = m; }
  function showError(m) { document.getElementById('error-msg').textContent = m; }
  function clearError() { document.getElementById('error-msg').textContent = ''; }

  document.getElementById('url-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loadURL();
  });
</script>
</body>
</html>
